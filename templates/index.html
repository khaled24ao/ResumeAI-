<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">ResumeAI - Smart CV Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #00d4aa;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
            --text-muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 20%);
        }
        
        [dir="rtl"] {
            font-family: 'Outfit', 'Segoe UI', Tahoma, Arial, sans-serif;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }
        
        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }
        
        .language-selector {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            z-index: 1000;
            outline: none;
            transition: all 0.3s ease;
        }

        .language-selector:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }
        
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin-top: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2);
        }
        
        .upload-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.3);
        }

        .upload-btn:active {
            transform: translateY(0) scale(0.98);
        }
        
        #file-input {
            display: none;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            display: none;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-msg {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: #ff6b6b;
            padding: 1.2rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
            backdrop-filter: blur(10px);
            max-width: 400px;
            text-align: center;
        }
        
        .results {
            margin-top: 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .card h3 {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .score-card {
            grid-column: 1 / -1;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(0, 242, 254, 0.1), transparent);
        }
        
        .score-value {
            font-size: 6rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        
        .score-max {
            font-size: 2rem;
            color: var(--text-muted);
            font-weight: 300;
        }
        
        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 0.8rem 0;
            color: #ccc;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .check-icon { color: var(--accent); font-size: 1.2rem; }
        .x-icon { color: #ff6b6b; font-size: 1.2rem; }
        
        .summary-text {
            line-height: 1.8;
            color: #ddd;
            font-weight: 300;
        }
        
        .keyword-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .keyword {
            background: rgba(79, 172, 254, 0.1);
            color: var(--secondary);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            border: 1px solid rgba(79, 172, 254, 0.2);
            transition: all 0.3s ease;
        }

        .keyword:hover {
            background: rgba(79, 172, 254, 0.2);
            transform: scale(1.05);
        }
        
        .history-link {
            display: inline-block;
            margin-top: 4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        
        .history-link:hover {
            color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .footer {
            text-align: center;
            padding-bottom: 4rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            body { padding: 1rem; }
        }
    </style>

</head>
<body>
    <select class="language-selector" id="language-select" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="ar">العربية</option>
    </select>

    <div class="container">
        <header>
            <h1 id="app-name">ResumeAI</h1>
            <p class="subtitle" id="app-tagline">Smart CV Analysis with AI</p>
        </header>
        
        <div class="upload-section">
            <button class="upload-btn" onclick="document.getElementById('file-input').click()" id="upload-btn">
                Upload PDF Resume
            </button>
            <input type="file" id="file-input" accept=".pdf">
            <div class="spinner" id="spinner"></div>
            <div class="error-msg" id="error"></div>
        </div>
        
        <div class="results" id="results"></div>
        
        <a href="/history-view" class="history-link" id="view-history">View Analysis History</a>
    </div>
    
    <script>
        // Translation strings
        const translations = {
            en: {
                "app.name": "ResumeAI",
                "app.tagline": "Smart CV Analysis with AI",
                "upload.button": "Upload PDF Resume",
                "results.score": "Overall Score",
                "results.strengths": "Strengths",
                "results.weaknesses": "Weaknesses",
                "results.summary": "Improved Summary",
                "results.keywords": "Missing Keywords",
                "view.history": "View Analysis History"
            },
            ar: {
                "app.name": "ريزيومAI",
                "app.tagline": "تحليل السيرة الذاتية الذكي بالذكاء الاصطناعي",
                "upload.button": "تحميل السيرة الذاتية (PDF)",
                "results.score": "الدرجة الإجمالية",
                "results.strengths": "النقاط القوية",
                "results.weaknesses": "نقاط الضعف",
                "results.summary": "ملخص محسن",
                "results.keywords": "كلمات مفتاحية مفقودة",
                "view.history": "عرض سجل التحليلات"
            }
        };

        let currentLang = 'en';

        function changeLanguage() {
            const select = document.getElementById('language-select');
            currentLang = select.value;
            const dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            document.body.dir = dir;
            document.documentElement.lang = currentLang;
            
            // Update all translatable elements
            document.getElementById('app-name').textContent = translations[currentLang]['app.name'];
            document.getElementById('app-tagline').textContent = translations[currentLang]['app.tagline'];
            document.getElementById('upload-btn').textContent = translations[currentLang]['upload.button'];
            document.getElementById('view-history').textContent = translations[currentLang]['view.history'];
            
            // Update results if visible
            if (document.getElementById('results').style.display === 'block') {
                displayResults(window.lastResult);
            }
            
            // Save preference
            localStorage.setItem('language', currentLang);
        }

        // Load saved language
        const savedLang = localStorage.getItem('language');
        if (savedLang) {
            document.getElementById('language-select').value = savedLang;
            changeLanguage();
        }

        const fileInput = document.getElementById('file-input');
        const spinner = document.getElementById('spinner');
        const errorDiv = document.getElementById('error');
        const resultsDiv = document.getElementById('results');
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            spinner.style.display = 'block';
            errorDiv.style.display = 'none';
            resultsDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/v1/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }
                
                window.lastResult = data.result;
                displayResults(data.result);
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
            }
        });
        
        function displayResults(result) {
            const t = translations[currentLang];
            
            resultsDiv.style.display = 'grid';
            resultsDiv.innerHTML = `
                <div class="card score-card">
                    <h3>${t['results.score']}</h3>
                    <div class="score-display">
                        <span class="score-value">${result.score}</span>
                        <span class="score-max">/10</span>
                    </div>
                </div>
                
                <div class="card">
                    <h3>${t['results.strengths']}</h3>
                    <div class="list">
                        ${result.strengths.map(s => `
                            <div class="list-item">
                                <span class="check-icon">✦</span>
                                <span>${s}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="card">
                    <h3>${t['results.weaknesses']}</h3>
                    <div class="list">
                        ${result.weaknesses.map(w => `
                            <div class="list-item">
                                <span class="x-icon">✧</span>
                                <span>${w}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="card">
                    <h3>${t['results.summary']}</h3>
                    <p class="summary-text">${result.improved_summary}</p>
                </div>
                
                <div class="card">
                    <h3>${t['results.keywords']}</h3>
                    <div class="keyword-container">
                        ${result.keywords_missing.map(k => `<span class="keyword">${k}</span>`).join('')}
                    </div>
                </div>
            `;
        }

    </script>
</body>
</html>
